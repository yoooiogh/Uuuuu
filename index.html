<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Overlay Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container designed to match the aspect ratio of the screenshot */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: #0b0b0d;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* Top Header Area matching screenshot */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #0f0f12;
            border-bottom: 1px solid #1a1a22;
        }

        .manager-dropdown {
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .manager-dropdown::after {
            content: "▼";
            font-size: 10px;
            margin-left: 2px;
        }

        .stats-badges {
            display: flex;
            gap: 6px;
        }

        .badge {
            background-color: #1f1f23;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge-timer::before {
            content: "🕒";
            font-size: 11px;
        }

        .badge-viewers::before {
            content: "👥";
            font-size: 11px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #adadb8;
        }

        .gear-icon {
            font-size: 18px;
            cursor: pointer;
        }

        .profile-dot {
            width: 20px;
            height: 20px;
            background-color: #464649;
            border-radius: 50%;
        }

        /* Live Chat Sub-header */
        .chat-title-bar {
            padding: 14px 16px;
            font-size: 15px;
            font-weight: bold;
            background-color: #0b0b0d;
            border-bottom: 1px solid #16161c;
        }

        /* Stream / Video Area Placeholder (Matches the dark/redacted middle segment) */
        .stream-viewport {
            flex-grow: 1;
            background-color: #050505;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        /* Integrated Chat Stream - fully expanded and visible */
        .chat-container {
            height: 100%;
            width: 100%;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            overflow-y: auto;
        }

        .chat-container::-webkit-scrollbar {
            width: 0px;
        }

        .chat-line {
            font-size: 13px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.15s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bottom Input Bar Area */
        .input-bar {
            padding: 12px 16px;
            background-color: #0b0b0d;
            display: flex;
            gap: 10px;
        }

        .message-input-wrapper {
            flex-grow: 1;
            background-color: #18181b;
            border: 1px solid #2f2f35;
            border-radius: 6px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
        }

        .message-input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .message-input-wrapper input::placeholder {
            color: #757575;
        }

        .chat-btn {
            background-color: #9146ff;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 0 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-btn:hover {
            background-color: #772ce8;
        }

        /* Navigation Dock at the very bottom */
        .nav-dock {
            background-color: #060608;
            border-top: 1px solid #121217;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #adadb8;
            font-size: 11px;
            cursor: pointer;
            width: 60px;
        }

        .nav-item.active {
            color: #9146ff;
        }

        .nav-icon {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Top Toolbar Elements -->

            <div class="stats-badges">

            </div>
            <div class="header-actions">
                <span class="gear-icon">⚙️</span>
                <div class="profile-dot"></div>
            </div>
        </div>

        <!-- Chat Header Panel -->
        <div class="chat-title-bar">Live Chat</div>

        <!-- Live Viewport Segment containing streaming chats -->
        <div class="stream-viewport">
            <!-- Chat Container inside stream frame window -->
            <div class="chat-container" id="chatContainer"></div>
        </div>

        <!-- Composition Input controls -->
        <div class="input-bar">
            <div class="message-input-wrapper">
                <input type="text" placeholder="Send a message" disabled>
            </div>
            <button class="chat-btn">Chat</button>
        </div>

        <!-- Bottom Tab Interface Layout -->
        <div class="nav-dock">
            <div class="nav-item">
                <span class="nav-icon">📺</span>
                <span>Stream</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">🔔</span>
                <span>Feed</span>
            </div>
            <div class="nav-item active">
                <span class="nav-icon">💬</span>
                <span>Chat</span>
            </div>
            <div class="nav-item">
                <span class="nav-icon">👥</span>

        const chatFillers = [" PogU!!!", " LFG!!!", " Hype!", " lmao", " KekW", " 🔥🔥🔥", " 💀💀💀", " monkaS", " NotLikeThis", " GIGACHAD"];

        const chatContainer = document.getElementById('chatContainer');

        // --- FIXED 2 MESSAGES PER SECOND ENGINE ---
        function pushMessage() {
            const user = chatUsernames[Math.floor(Math.random() * chatUsernames.length)];
            const color = userColors[Math.floor(Math.random() * userColors.length)];
            const phrase = chatTemplates[Math.floor(Math.random() * chatTemplates.length)];
            const filler = Math.random() > 0.4 ? chatFillers[Math.floor(Math.random() * chatFillers.length)] : "";

            const line = document.createElement('div');
            line.className = 'chat-line';
            line.innerHTML = `<span style="color: ${color}; font-weight: bold; margin-right: 4px;">${user}:</span><span>${phrase}${filler}</span>`;
            
            chatContainer.appendChild(line);

            if (chatContainer.children.length > 60) {
                chatContainer.removeChild(chatContainer.firstChild);
            }

            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        setInterval(pushMessage, 500);

        // --- BACKGROUND SPEECH UTIL ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.onend = () => { recognition.start(); };
            recognition.start();
        }
